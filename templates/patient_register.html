<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration | Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="brand-bar">
        <strong>Hospital Management System</strong>
        <span class="pill"><span class="dot"></span>Patient portal</span>
    </div>

    <div class="auth-shell">
        <div class="register-card">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                <h1 class="mb-0">Patient Registration</h1>
                <span class="pill"><span class="dot"></span>Get started</span>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('patient_register') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input class="form-control" name="full_name" type="text" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input class="form-control" name="username" type="text" required autocomplete="username">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input class="form-control" name="email" type="email" required autocomplete="email">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <input class="form-control" name="password" type="password" required autocomplete="new-password">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input class="form-control" name="phone" type="text" autocomplete="tel">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input class="form-control" name="date_of_birth" type="date">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender">
                            <option value="">-- Select --</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Blood Group</label>
                        <input class="form-control" name="blood_group" type="text" placeholder="e.g., A+, O-">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="2"></textarea>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-info">Register</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <p class="mb-1">Already have an account? <a href="{{ url_for('patient_login') }}">Login here</a></p>
                <a class="home-link" href="{{ url_for('home') }}">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
