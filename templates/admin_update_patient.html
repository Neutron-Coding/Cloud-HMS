<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Patient | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f5f9fc; font-family:Arial,sans-serif; }
        .brand-bar { background:#198754; color:#fff; padding:14px; text-align:center; font-weight:600; font-size:1.1rem; }
        .wrap { max-width:800px; margin:28px auto; padding:0 20px; }
        .card { background:#fff; border-radius:8px; padding:24px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
        h1 { font-size:1.5rem; margin-bottom:16px; }
        .btn-back { background:#6c757d; color:#fff; padding:6px 14px; border-radius:4px; text-decoration:none; font-size:.85rem; display:inline-block; margin-bottom:16px; }
        .btn-back:hover { background:#5c636a; color:#fff; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="brand-bar">Update Patient - Admin Panel</div>
    <div class="wrap">
        <div class="card">
            <a href="{{ url_for('admin_manage_patients') }}" class="btn-back">&larr; Back to Manage Patients</a>
            <h1>Update Patient</h1>

            <form method="post" action="{{ url_for('admin_update_patient', patient_id=patient.id) }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="full_name" value="{{ patient.full_name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="username" value="{{ patient.username }}" required>
                        <small class="form-text text-muted">Used for login</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" name="email" value="{{ patient.email }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" name="phone" value="{{ patient.phone or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" name="date_of_birth" value="{{ patient.date_of_birth.strftime('%Y-%m-%d') if patient.date_of_birth else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender">
                            <option value="">-- Select --</option>
                            <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Blood Group</label>
                        <input type="text" class="form-control" name="blood_group" value="{{ patient.blood_group or '' }}">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="3">{{ patient.address or '' }}</textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning">Update Patient</button>
                <a href="{{ url_for('admin_manage_patients') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
