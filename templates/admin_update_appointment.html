<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Appointment | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f5f9fc; font-family:Arial,sans-serif; }
        .brand-bar { background:#198754; color:#fff; padding:14px; text-align:center; font-weight:600; font-size:1.1rem; }
        .wrap { max-width:800px; margin:28px auto; padding:0 20px; }
        .card { background:#fff; border-radius:8px; padding:24px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
        h1 { font-size:1.5rem; margin-bottom:16px; }
        .btn-back { background:#6c757d; color:#fff; padding:6px 14px; border-radius:4px; text-decoration:none; font-size:.85rem; display:inline-block; margin-bottom:16px; }
        .btn-back:hover { background:#5c636a; color:#fff; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="brand-bar">Update Appointment - Admin Panel</div>
    <div class="wrap">
        <div class="card">
            <a href="{{ url_for('admin_manage_appointments') }}" class="btn-back">&larr; Back to Manage Appointments</a>
            <h1>Update Appointment</h1>

            <form method="post" action="{{ url_for('admin_update_appointment', appointment_id=appointment.id) }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Patient <span class="text-danger">*</span></label>
                        <select class="form-select" name="patient_id" required>
                            <option value="">-- Select Patient --</option>
                            {% for patient in patients %}
                            <option value="{{ patient.id }}" {% if appointment.patient_id == patient.id %}selected{% endif %}>
                                {{ patient.full_name }} (ID: {{ patient.id }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Doctor <span class="text-danger">*</span></label>
                        <select class="form-select" name="doctor_id" required>
                            <option value="">-- Select Doctor --</option>
                            {% for doctor in doctors %}
                            <option value="{{ doctor.id }}" {% if appointment.doctor_id == doctor.id %}selected{% endif %}>
                                {{ doctor.full_name }} - {{ doctor.specialization }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" name="appointment_date" value="{{ appointment.appointment_date.strftime('%Y-%m-%d') }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Time <span class="text-danger">*</span></label>
                        <input type="time" class="form-control" name="appointment_time" value="{{ appointment.appointment_time }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Status <span class="text-danger">*</span></label>
                        <select class="form-select" name="status" required>
                            <option value="Booked" {% if appointment.status == 'Booked' %}selected{% endif %}>Booked</option>
                            <option value="Completed" {% if appointment.status == 'Completed' %}selected{% endif %}>Completed</option>
                            <option value="Cancelled" {% if appointment.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Reason</label>
                        <textarea class="form-control" name="reason" rows="2">{{ appointment.reason or '' }}</textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning">Update Appointment</button>
                <a href="{{ url_for('admin_manage_appointments') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
