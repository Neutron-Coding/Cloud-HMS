<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Departments | Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f5f9fc; font-family:Arial,sans-serif; }
        .brand-bar { background:#17a2b8; color:#fff; padding:14px; text-align:center; font-weight:600; font-size:1.1rem; }
        .wrap { max-width:1100px; margin:28px auto; padding:0 20px; }
        .card { background:#fff; border-radius:8px; padding:24px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
        h1 { font-size:1.5rem; margin-bottom:16px; }
        .btn-back { background:#6c757d; color:#fff; padding:6px 14px; border-radius:4px; text-decoration:none; font-size:.85rem; display:inline-block; margin-bottom:16px; }
        .btn-back:hover { background:#5c636a; color:#fff; }
        .dept-grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); margin-top:20px; }
        .dept-card { padding:20px; background:#f8f9fa; border-radius:8px; border-left:4px solid #17a2b8; transition:transform 0.2s; }
        .dept-card:hover { transform:translateY(-4px); box-shadow:0 4px 12px rgba(0,0,0,.1); }
        .dept-card h3 { font-size:1.2rem; margin-bottom:8px; color:#17a2b8; }
        .dept-card p { font-size:.9rem; color:#666; margin-bottom:12px; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="brand-bar">Departments - Patient Panel</div>
    <div class="wrap">
        <div class="card">
            <a href="{{ url_for('patient_dashboard') }}" class="btn-back">&larr; Back to Dashboard</a>
            <h1>Available Departments</h1>

            {% if departments %}
            <div class="dept-grid">
                {% for dept in departments %}
                <div class="dept-card">
                    <h3>{{ dept.name }}</h3>
                    <p>{{ dept.description or 'No description available.' }}</p>
                    <a href="{{ url_for('patient_view_doctors', dept_id=dept.id) }}" class="btn btn-info btn-sm">View Doctors</a>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <p class="text-muted">No departments available at the moment.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
