<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Login | Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="brand-bar">
        <strong>Hospital Management System</strong>
        <span class="pill"><span class="dot"></span>Patient portal</span>
    </div>

    <div class="auth-shell">
        <div class="login-card">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
                <h1 class="mb-0">Patient Login</h1>
                <span class="pill"><span class="dot"></span>Appointments</span>
            </div>
            <p class="muted mb-3">Book appointments, track treatments, and manage your details.</p>

            {% if error %}
            <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('patient_login') }}">
                <div class="mb-3">
                    <label class="form-label">Email or Username</label>
                    <input class="form-control" name="username" type="text" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" name="password" type="password" required autocomplete="current-password">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-info">Sign in</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <p class="mb-1">Don't have an account? <a href="{{ url_for('patient_register') }}">Register here</a></p>
                <a class="home-link" href="{{ url_for('home') }}">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
