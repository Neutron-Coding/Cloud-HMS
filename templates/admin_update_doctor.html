<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Doctor | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f9fc;
            font-family: Arial, sans-serif;
        }

        .brand-bar {
            background: #198754;
            color: #fff;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .wrap {
            max-width: 800px;
            margin: 28px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .btn-back {
            background: #6c757d;
            color: #fff;
            padding: 6px 14px;
            border-radius: 4px;
            text-decoration: none;
            font-size: .85rem;
            display: inline-block;
            margin-bottom: 16px;
        }

        .btn-back:hover {
            background: #5c636a;
            color: #fff;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <div class="brand-bar">Update Doctor - Admin Panel</div>
    <div class="wrap">
        <div class="card">
            <a href="{{ url_for('admin_manage_doctors') }}" class="btn-back">&larr; Back to Manage Doctors</a>
            <h1>Update Doctor</h1>

            <form method="post" action="{{ url_for('admin_update_doctor', doctor_id=doctor.id) }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="full_name" value="{{ doctor.full_name }}"
                            required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="username" value="{{ doctor.username }}" required>
                        <small class="form-text text-muted">Used for login</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" name="email" value="{{ doctor.email }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Specialization <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="specialization"
                            value="{{ doctor.specialization }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" name="phone" value="{{ doctor.phone or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Qualification</label>
                        <input type="text" class="form-control" name="qualification"
                            value="{{ doctor.qualification or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Experience (years)</label>
                        <input type="number" class="form-control" name="experience"
                            value="{{ doctor.experience or '' }}" min="0">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Department <span class="text-danger">*</span></label>
                        <select class="form-select" name="department_id" required>
                            <option value="">-- Select Department --</option>
                            {% for dept in departments %}
                            <option value="{{ dept.id }}" {% if doctor.department_id==dept.id %}selected{% endif %}>
                                {{ dept.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning">Update Doctor</button>
                <a href="{{ url_for('admin_manage_doctors') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
