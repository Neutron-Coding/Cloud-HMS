<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f5f9fc; font-family:Arial,sans-serif; }
        .brand-bar { background:#17a2b8; color:#fff; padding:14px; text-align:center; font-weight:600; font-size:1.1rem; }
        .wrap { max-width:700px; margin:28px auto; padding:0 20px; }
        .card { background:#fff; border-radius:8px; padding:24px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
        h1 { font-size:1.5rem; margin-bottom:16px; }
        .btn-back { background:#6c757d; color:#fff; padding:6px 14px; border-radius:4px; text-decoration:none; font-size:.85rem; display:inline-block; margin-bottom:16px; }
        .btn-back:hover { background:#5c636a; color:#fff; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="brand-bar">Edit Profile - Patient Panel</div>
    <div class="wrap">
        <div class="card">
            <a href="{{ url_for('patient_dashboard') }}" class="btn-back">&larr; Back to Dashboard</a>
            <h1>Edit Profile</h1>

            <form method="post" action="{{ url_for('patient_edit_profile') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input class="form-control" name="full_name" type="text" value="{{ patient.full_name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input class="form-control" name="username" type="text" value="{{ patient.username }}" required>
                        <small class="form-text text-muted">Used for login</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input class="form-control" name="email" type="email" value="{{ patient.email }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input class="form-control" name="phone" type="text" value="{{ patient.phone or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input class="form-control" name="date_of_birth" type="date" value="{{ patient.date_of_birth.strftime('%Y-%m-%d') if patient.date_of_birth else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender">
                            <option value="">-- Select --</option>
                            <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Blood Group</label>
                        <input class="form-control" name="blood_group" type="text" value="{{ patient.blood_group or '' }}" placeholder="e.g., A+, O-">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="2">{{ patient.address or '' }}</textarea>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">New Password</label>
                        <input class="form-control" name="new_password" type="password" placeholder="Leave blank to keep current password">
                        <div class="form-text">Only fill this if you want to change your password.</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success">Update Profile</button>
                <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
