<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login | Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <div class="brand-bar">
        <strong>Hospital Management System</strong>
        <span class="pill"><span class="dot"></span>Admin access</span>
    </div>

    <div class="auth-shell">
        <div class="login-card">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
                <h1 class="mb-0">Admin Login</h1>
                <span class="pill"><span class="dot"></span>Operations</span>
            </div>
            <p class="muted mb-3">Keep schedules, records, and teams in sync.</p>

            {% if error %}
            <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('admin_login') }}">
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" id="username" name="username" type="text" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="pwd">Password</label>
                    <input class="form-control" id="pwd" name="password" type="password" required
                        autocomplete="current-password">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success">Sign in</button>
                </div>
            </form>

            <div class="mt-3">
                <a class="home-link" href="{{ url_for('home') }}">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>

</html>
